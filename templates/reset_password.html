{% extends "base.html" %}

{% block title %}Reset Password — CrewHub{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter the 6-digit OTP sent to <strong>{{ email }}</strong>, then choose a new password.</p>
            </div>

            <form method="POST" action="{{ url_for('reset_password') }}" class="auth-form">
                <div class="form-group">
                    <label class="form-label">OTP Code</label>
                    <div class="otp-grid">
                        {% for i in range(1,7) %}
                        <input type="text" name="otp{{ i }}" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="form-control otp-input" required>
                        {% endfor %}
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="new-password">New Password</label>
                    <div class="password-wrapper" style="position: relative;">
                        <input type="password" id="new-password" name="password" class="form-control" placeholder="Enter new password" required autocomplete="new-password" style="padding-right: 42px;">
                        <span class="password-toggle" onclick="togglePassword('new-password', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <div class="password-wrapper" style="position: relative;">
                        <input type="password" id="confirm-password" name="confirm_password" class="form-control" placeholder="Re-enter new password" required autocomplete="new-password" style="padding-right: 42px;">
                        <span class="password-toggle" onclick="togglePassword('confirm-password', this)" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
            </form>

            <div class="auth-footer">
                <p>Back to <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    const otpInputs = document.querySelectorAll('.otp-input');
    otpInputs.forEach((input, index) => {
        input.addEventListener('input', () => {
            if (input.value.length === 1 && index < otpInputs.length - 1) {
                otpInputs[index + 1].focus();
            }
        });
        input.addEventListener('keydown', (event) => {
            if (event.key === 'Backspace' && !input.value && index > 0) {
                otpInputs[index - 1].focus();
            }
        });
    });

    function togglePassword(fieldId, iconSpan) {
        const field = document.getElementById(fieldId);
        if (!field) return;
        if (field.type === 'password') {
            field.type = 'text';
            iconSpan.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
        } else {
            field.type = 'password';
            iconSpan.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
        }
    }
</script>
{% endblock %}
