{% extends "base.html" %}

{% block title %}Forgot Password — CrewHub{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Forgot Password</h1>
                <p>Enter your email address and we will send a one-time OTP to reset your password.</p>
            </div>

            <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
                <div class="form-group">
                    <label class="form-label" for="forgot-email">Email Address</label>
                    <input type="email" id="forgot-email" name="email" class="form-control" placeholder="Enter your registered email" required autocomplete="email">
                </div>

                <button type="submit" class="btn btn-primary btn-full">Send OTP</button>
            </form>

            <div class="auth-footer">
                <p>Remember your password? <a href="{{ url_for('login') }}">Login now</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
